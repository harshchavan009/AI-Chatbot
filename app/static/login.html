<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .auth-container {
            width: 400px;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease-out;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary-color);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .auth-btn:hover {
            background-color: var(--primary-hover);
        }
        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .toggle-auth a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Please enter your details to sign in.</p>
        </div>
        <form id="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn" id="submit-btn">Sign In</button>
            <div id="error-msg" class="error-message">Invalid credentials. Please try again.</div>
        </form>
        <div class="toggle-auth">
            <span id="toggle-text">Don't have an account?</span>
            <a href="#" id="toggle-link">Sign Up</a>
        </div>
    </div>

    <script>
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleLink = document.getElementById('toggle-link');
        const toggleText = document.getElementById('toggle-text');
        const errorMsg = document.getElementById('error-msg');

        let isLogin = true;

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? 'Welcome Back' : 'Create Account';
            authSubtitle.innerText = isLogin ? 'Please enter your details to sign in.' : 'Join us to start chatting with AI.';
            submitBtn.innerText = isLogin ? 'Sign In' : 'Sign Up';
            toggleText.innerText = isLogin ? "Don't have an account?" : 'Already have an account?';
            toggleLink.innerText = isLogin ? 'Sign Up' : 'Sign In';
            errorMsg.style.display = 'none';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            errorMsg.style.display = 'none';

            const url = isLogin ? '/api/login' : '/api/signup';
            
            try {
                let response;
                if (isLogin) {
                    const formData = new FormData();
                    formData.append('username', username);
                    formData.append('password', password);
                    response = await fetch(url, {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                }

                if (response.ok) {
                    if (isLogin) {
                        const data = await response.json();
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('username', username);
                        window.location.href = '/';
                    } else {
                        alert('Account created! Please sign in.');
                        toggleLink.click();
                    }
                } else {
                    const error = await response.json();
                    errorMsg.innerText = error.detail || 'An error occurred.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Server error. Please try again later.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
