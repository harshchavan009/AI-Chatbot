<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Premium Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <header>
            <div class="header-info">
                <div class="status-indicator"></div>
                <h1>AI Assistant</h1>
                <div class="controls">
                    <select id="language-selector" class="lang-select">
                        <option value="English">🇺🇸 English</option>
                        <option value="Spanish">🇪🇸 Spanish</option>
                        <option value="French">🇫🇷 French</option>
                        <option value="German">🇩🇪 German</option>
                        <option value="Hindi">🇮🇳 Hindi</option>
                        <option value="Japanese">🇯🇵 Japanese</option>
                        <option value="Chinese">🇨🇳 Chinese</option>
                        <option value="Arabic">🇸🇦 Arabic</option>
                    </select>
                    <button id="logout-btn" class="logout-link" title="Logout">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <p>Always online, always helpful.</p>
        </header>

        <main id="chat-window">
            <div class="message assistant">
                <div class="bubble">
                    Hello! I'm your AI Assistant. How can I help you today?
                </div>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message..." required autocomplete="off">
                <button type="submit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
