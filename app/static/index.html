<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Premium Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
    <style>
        #vanta-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
    <!-- Three.js and Vanta.js for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
</head>
<body>
    <div id="vanta-canvas"></div>
    <div class="chat-container">
        <header>
            <div class="header-info">
                <div class="status-indicator"></div>
                <h1>AI Assistant</h1>
                <div class="controls">
                    <div class="custom-dropdown" id="language-dropdown">
                        <div class="dropdown-selected">
                            <span id="selected-lang-text">🇺🇸 English</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                        <div class="dropdown-options">
                            <div class="option" data-value="English">🇺🇸 English</div>
                            <div class="option" data-value="Spanish">🇪🇸 Spanish</div>
                            <div class="option" data-value="French">🇫🇷 French</div>
                            <div class="option" data-value="German">🇩🇪 German</div>
                            <div class="option" data-value="Hindi">🇮🇳 Hindi</div>
                            <div class="option" data-value="Japanese">🇯🇵 Japanese</div>
                            <div class="option" data-value="Chinese">🇨🇳 Chinese</div>
                            <div class="option" data-value="Arabic">🇸🇦 Arabic</div>
                        </div>
                    </div>
                    <button id="logout-btn" class="logout-link" title="Logout">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <p>Always online, always helpful.</p>
        </header>

        <main id="chat-window">
            <div class="message assistant">
                <div class="bubble">
                    Hello! I'm your AI Assistant. How can I help you today?
                </div>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message..." required autocomplete="off">
                <button type="submit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
    <script>
        // Initialize 3D Net Background
        window.addEventListener('DOMContentLoaded', () => {
            VANTA.NET({
                el: "#vanta-canvas",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: 0x6366f1,
                backgroundColor: 0x0f172a,
                points: 12.00,
                maxDistance: 22.00,
                spacing: 16.00
            })
        });
    </script>
</body>
</html>
